<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Replace the names of multiple object keys with the values provided</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link rel="stylesheet" type="text/css" media="screen" href="main.css" /> -->
  <script>
  const rename_keys = (keysMap, obj) =>
  Object.keys(obj).reduce(
    (acc, key) => ({
      ...acc,
      ...{ [keysMap[key] || key]: obj[key] }
    }),
    {}
  );
  const obj = { name: 'Tora', job: 'Programmer', shoeSize: 41 };
  console.log("Original Object");
  console.log(obj);
  console.log("-------------------------------------");
  result = rename_keys({ name: 'firstName', job: 'Actor' }, obj);
  console.log("New Object");
  console.log(result);
  </script>
</head>
<body>
  
</body>
</html>
