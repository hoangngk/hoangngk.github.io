<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>JS Assignment 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="jumbotron">
      <header class="text-center mb-1 border-bottom">
        <h1 class="d-block mx-auto">JS Assignment 2</h1>
      </header>

      <main class="mt-4 w-50 mx-auto">
        <h2 class="text-center text-info">Job List</h2>
        <form id="addJobForm">
          <div class="form-group">
            <label for="jobNameInput">Job name</label>
            <input
              type="text"
              class="form-control"
              id="jobNameInput"
              aria-describedby="emailHelp"
              placeholder="Frontend developer"
            />
          </div>

          <button
            type="button"
            class="btn btn-info w-100 d-block mx-auto"
            onclick="addJob()"
          >
            Add
          </button>
        </form>
        <div class="card mt-4">
          <ul id="jobListView" class="list-group list-group-flush"></ul>
        </div>
      </main>
    </div>
    <script src="main.js"></script>
  </body>
</html>
