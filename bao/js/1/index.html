<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>JS Assignment 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />

    <script src="main.js"></script>
  </head>
  <body>
    <div class="jumbotron">
      <header class="text-center mb-1 border-bottom">
        <h1 class="d-block mx-auto">JS Assignment 1</h1>
      </header>

      <main class="mt-4">
        <h2 class="text-center text-info">Login Form</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="emailInput">Email address</label>
            <input
              type="email"
              class="form-control"
              id="emailInput"
              aria-describedby="emailHelp"
              placeholder="thebao.dev@gmail.com,..."
            />
            <small id="emailHelp" class="form-text text-muted"
              >We'll never share your email with anyone else.</small
            >
          </div>
          <div class="form-group">
            <label for="passwordInput">Password</label>
            <input
              type="password"
              class="form-control"
              id="passwordInput"
              placeholder="*********"
            />
          </div>
          <div id="alertMessage" role="alert"></div>

          <button
            type="button"
            class="btn btn-info float-right px-5"
            onclick="return validate()"
          >
            Login
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
