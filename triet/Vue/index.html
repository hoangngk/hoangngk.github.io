<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script> 
  <title>Document</title>
</head>
<body>
  <div id="app">
    {{ message }}
  </div>
  <div id="app-2">
    <span v-bind:title='message'>
        Hover your mouse over me
    </span>
  </div>

  <div id="app-3">
    <span v-if='seen'>
      Now you see me
    </span>
  </div>

  <div id="app-4">
    <ol>
      <li v-for='todo in todos'>
        {{ todo.text }}
      </li>
    </ol>
  </div>

  <div class="" id="app-5">
    <p> {{ message }} </p>
    <button v-on:click= 'reverseMessage'>Reverse Message </button>
  </div>

  <div id="app-6">
    <p>{{ message }}</p>
    <input v-model="message">
  </div>

  <div id="app-7">
    <ol>
      <todo-item
        v-for="item in groceryList"
        v-bind:todo= "item"
        v-bind:key="item.id">

      </todo-item>
    </ol>
  </div>

  <div id="example">
    <h2>Computed</h2>
    <p>{{ message }}</p>
    <p>{{ reversedMessage }}</p>
  </div>

  <div id="example2">
    <h2>Method</h2>
    <p>{{ message }}</p>
    <p>{{ reversedMessage()}}</p>
  </div>

  <div id="demo">
    <h2>Computed</h2>
    <p>{{ fullName }}</p>
  </div>

  <div id="demo2">
    <h2>Watched</h2>
    <p>{{ fullName }}</p>
  </div>

  <div id="watcher">
    <p>Ask yes/no question
    <input type="text" v-model='question'>
    </p>
    <p>{{ answer }}</p>
  </div>

  <div id="cla" v-bind:class ='classObject'>
  </div>


  <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
