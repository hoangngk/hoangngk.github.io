<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
  <div>
    <div class="input">
      value : <input id="inputAdd" type="text"/> 
      <button id="btnAdd">Add</button>
    </div>
    <div class="list">
      
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
  <script>
    var count = 0;
    $("#btnAdd").click(function() {
      $(".list").append("<div id=\"" + count + "\"><p>" + $("#inputAdd").val() + "</p> <button id=\"btnDelete" + count + "\" onclick=\"deleteItem(" + count + ")\">Delete</button></div>");
      $("#inputAdd").val("");
      count = count + 1;
    });

    function deleteItem(id) {
      $("#" + id).remove();
    }
  </script>
</body>
</html>
