<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Create an array of key-value pair arrays from an given object</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link rel="stylesheet" type="text/css" media="screen" href="main.css" /> -->
  <script>
  const object_to_pairs = obj => Object.keys(obj).map(k => [k, obj[k]]);
  console.log(object_to_pairs({ a: 1, b: 2 }));
  console.log(object_to_pairs({ a: 1, b: 2, c: 3 }));
  </script>
</head>
<body>
  
</body>
</html>
