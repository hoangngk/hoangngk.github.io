<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible"
        content="IE=edge">
  <title>VueJs</title>
  <meta name="viewport"
        content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>


</head>

<body>
  <div id="app">
    <section class="todoapp">
      <header class="header">
        <h1>todos</h1>
        <input v-model="newTodo"
            v-on:keyup.enter="addTodo()" class="new-todo" autofocus autocomplete="off" placeholder="What needs to be done?">
      </header>

      <section class="main" v-show="todos.length">
        <input class="toggle-all" type="checkbox" @click="allDone">
        <ul class="todo-list">
          <li v-for="(todo, index) in todos">
            <div class="view">
              <input type="checkbox" class="toggle"
                    v-on:change="toggle(todo)"
                    v-bind:checked="todo.done">

              <span v-bind:style="{textDecoration: todo.done ? 'line-through' : ''}">{{ todo.text }}</span>
              <!-- <label v-on:dblclick="editTodo(todo)">{{ todo.text }}</label> -->
              <button v-on:click="removeTodo(index)">X</button>
              <button v-on:click="editTodo(todo)">Edit</button>
            </div>
          </li>
          <button v-on:click="clearAll()">Clear all</button>

        </ul>
      </section>
    </section>
  </div>

</body>
<script src="todo.js"></script>

</html>
