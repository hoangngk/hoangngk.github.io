<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Document</title>
</head>

<body>
    <h2>Generate a random hexadecimal color code</h2>
    <script>
        const random_hex_color_code = () => {
            let n = (Math.random() * 0xfffff * 1000000).toString(16);
            return '#' + n.slice(0, 6);
        };

        console.log(random_hex_color_code())
    </script>
</body>

</html>
