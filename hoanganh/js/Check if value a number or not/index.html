<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible"
          content="ie=edge">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.17/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <input v-model="message">
        <button v-on:click="checkNumber">Check</button>
        <p>{{ message2 }} </p>
    </div>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                message: '',
                message2: ''
            },
            methods: {
                checkNumber: function () {
                    if (isNaN(this.message)) {
                        this.message2 = this.message + ' is not a number';
                    } else {
                        this.message2 = this.message + ' is a number';
                    }
                }
            }
        })


    </script>

</body>

</html>
