<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Document</title>
</head>

<body>
    <h2>Returns true if the provided predicate function returns true for all elements in a collection, false otherwise/h2>
    <script>
        const all = (arr, fn = Boolean) => arr.every(fn);
console.log(all([4, 2, 3], x => x > 1)); 
console.log(all([4, 2, 3], x => x < 1));

    </script>
</body>

</html>
