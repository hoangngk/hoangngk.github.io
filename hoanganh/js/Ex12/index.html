<body>
    <h2>Removes non-printable ASCII characters from a given string</h2>
    <script>
        const remove_non_ASCII = str => str.replace(/[^\x20-\x7E]/g, '');
        console.log(remove_non_ASCII('채횆챌횉챕횋챗w3resour철ce횜횖첸첬횣'));
    </script>
</body>
</html>
