<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible"
          content="ie=edge">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.17/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <p>{{ message }}</p>
        <button v-on:click="decapitalize">Decapitalize Message</button>
    </div>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                message: 'Decaptialize The First Letter Of A String!'
            },
            methods: {
                decapitalize: function () {
                    this.message = this.message.toLowerCase()
                }
            }
        })


    </script>

</body>

</html>
