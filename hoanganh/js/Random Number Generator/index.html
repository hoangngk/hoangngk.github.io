<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible"
          content="ie=edge">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.17/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <p>{{ number }}</p>
        <button v-on:click="randomNumber">Geneate Random Number between 0 and 100</button>
    </div>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                number: ''
            },
            methods: {

                randomNumber: function () {
                    this.number = Math.floor(Math.random() * 101);
                }
            }
        })




    </script>

</body>

</html>
